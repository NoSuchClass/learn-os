<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- body -->
  <ellipse cx="120" cy="170" rx="72" ry="48" fill="#b8956a" stroke="#8b6f47" stroke-width="1.5"/>

  <!-- legs -->
  <rect x="70" y="200" width="16" height="22" rx="7" fill="#8b6f47"/>
  <rect x="154" y="200" width="16" height="22" rx="7" fill="#8b6f47"/>

  <!-- head (wider rectangle-like) -->
  <ellipse cx="120" cy="108" rx="65" ry="52" fill="#c9a77b" stroke="#8b6f47" stroke-width="1.8"/>

  <!-- ears -->
  <ellipse cx="78" cy="72" rx="10" ry="11" fill="#b8956a" stroke="#8b6f47" stroke-width="1.3"/>
  <ellipse cx="162" cy="72" rx="10" ry="11" fill="#b8956a" stroke="#8b6f47" stroke-width="1.3"/>
  <ellipse cx="78" cy="72" rx="5" ry="6" fill="#8b6f47"/>
  <ellipse cx="162" cy="72" rx="5" ry="6" fill="#8b6f47"/>

  <!-- snout (lighter rounded rect in front) -->
  <ellipse cx="120" cy="130" rx="42" ry="26" fill="#d4b892"/>

  <!-- eyes (characteristic capybara: tiny slits of chill) -->
  <ellipse cx="96" cy="108" rx="5" ry="6" fill="#1e1b4b"/>
  <ellipse cx="144" cy="108" rx="5" ry="6" fill="#1e1b4b"/>
  <circle cx="98" cy="106" r="1.5" fill="#fff"/>
  <circle cx="146" cy="106" r="1.5" fill="#fff"/>

  <!-- nose -->
  <ellipse cx="120" cy="122" rx="6" ry="4" fill="#1e1b4b"/>

  <!-- mouth -->
  <path d="M 110 138 Q 120 142 130 138" stroke="#1e1b4b" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 120 132 L 120 138" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="82" cy="125" rx="8" ry="5" fill="#f472b6" opacity="0.35"/>
  <ellipse cx="158" cy="125" rx="8" ry="5" fill="#f472b6" opacity="0.35"/>
</svg>
