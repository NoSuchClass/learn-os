<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- outer gills (6 feathery tufts around head) -->
  <g fill="#fbcfe8" stroke="#f9a8d4" stroke-width="1.2">
    <path d="M 42 90 Q 20 75 24 105 Q 30 118 48 108 Z" />
    <path d="M 38 120 Q 15 125 28 148 Q 42 152 52 134 Z" />
    <path d="M 50 70 Q 36 50 60 48 Q 72 60 68 78 Z" />
    <path d="M 198 90 Q 220 75 216 105 Q 210 118 192 108 Z" />
    <path d="M 202 120 Q 225 125 212 148 Q 198 152 188 134 Z" />
    <path d="M 190 70 Q 204 50 180 48 Q 168 60 172 78 Z" />
  </g>

  <!-- body (rounded belly below head) -->
  <ellipse cx="120" cy="165" rx="58" ry="48" fill="#fbcfe8" stroke="#f9a8d4" stroke-width="1.5"/>

  <!-- arms -->
  <ellipse cx="65" cy="175" rx="14" ry="20" fill="#fbcfe8" stroke="#f9a8d4" stroke-width="1.5" transform="rotate(-15 65 175)"/>
  <ellipse cx="175" cy="175" rx="14" ry="20" fill="#fbcfe8" stroke="#f9a8d4" stroke-width="1.5" transform="rotate(15 175 175)"/>

  <!-- tiny fingers -->
  <g fill="#f9a8d4">
    <circle cx="58" cy="190" r="3"/>
    <circle cx="65" cy="194" r="3"/>
    <circle cx="72" cy="192" r="3"/>
    <circle cx="168" cy="192" r="3"/>
    <circle cx="175" cy="194" r="3"/>
    <circle cx="182" cy="190" r="3"/>
  </g>

  <!-- head (main round) -->
  <ellipse cx="120" cy="115" rx="68" ry="58" fill="#fecdd3" stroke="#f9a8d4" stroke-width="1.8"/>

  <!-- eyes -->
  <ellipse cx="92" cy="115" rx="9" ry="11" fill="#1e1b4b"/>
  <ellipse cx="148" cy="115" rx="9" ry="11" fill="#1e1b4b"/>

  <!-- eye highlights -->
  <circle cx="95" cy="111" r="2.8" fill="#ffffff"/>
  <circle cx="151" cy="111" r="2.8" fill="#ffffff"/>
  <circle cx="89" cy="118" r="1.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="145" cy="118" r="1.3" fill="#ffffff" opacity="0.7"/>

  <!-- blush -->
  <ellipse cx="75" cy="138" rx="10" ry="6" fill="#f472b6" opacity="0.4"/>
  <ellipse cx="165" cy="138" rx="10" ry="6" fill="#f472b6" opacity="0.4"/>

  <!-- mouth -->
  <path d="M 108 140 Q 120 150 132 140" stroke="#1e1b4b" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- belly shade -->
  <ellipse cx="120" cy="175" rx="42" ry="30" fill="#fef3f7" opacity="0.7"/>
</svg>
